name: Test

on:
  push:
    # branches: [master]
  pull_request:

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows prebuild
        run: npx prebuildify --napi --strip --arch ${{ matrix.arch }}
        working-directory: tree-sitter-kiwi

      - name: Upload prebuilds
        uses: actions/upload-artifact@v5
        with:
          name: prebuilds-win32-${{ matrix.arch }}
          path: tree-sitter-kiwi/prebuilds/

  build-unix:
    name: Build Unix (zig cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Unix prebuilds
        run: node scripts/build-prebuilds.mjs all
        working-directory: tree-sitter-kiwi

      - name: Upload prebuilds
        uses: actions/upload-artifact@v5
        with:
          name: prebuilds-unix
          path: tree-sitter-kiwi/prebuilds/

  test:
    name: Test & Package
    needs: [build-windows, build-unix]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Download all prebuilds
        uses: actions/download-artifact@v5
        with:
          pattern: prebuilds-*
          path: tree-sitter-kiwi/prebuilds/
          merge-multiple: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:ci

      - name: Test
        run: pnpm test

      - name: Package VSIX
        run: pnpm package

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: kiwi-vscode-vsix
          path: "*.vsix"

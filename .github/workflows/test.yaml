name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build prebuilds (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: darwin-arm64, os: macos-latest }
          - { target: darwin-x64,   os: macos-latest, arch: x64 }
          - { target: linux-x64,    os: ubuntu-latest }
          - { target: win32-x64,    os: windows-latest }
          - { target: win32-arm64,  os: windows-latest, arch: arm64 }

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build prebuild
        run: npx prebuildify --napi --strip ${{ matrix.arch && format('--arch {0}', matrix.arch) }}
        working-directory: tree-sitter-kiwi

      - name: Upload prebuilds
        uses: actions/upload-artifact@v6
        with:
          name: prebuilds-${{ matrix.target }}
          path: tree-sitter-kiwi/prebuilds/

  test:
    name: Test & Package
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Download all prebuilds
        uses: actions/download-artifact@v7
        with:
          pattern: prebuilds-*
          path: tree-sitter-kiwi/prebuilds/
          merge-multiple: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package VSIX
        run: pnpm package

      - name: Upload VSIX
        uses: actions/upload-artifact@v6
        with:
          name: kiwi-vscode-vsix
          path: "*.vsix"
